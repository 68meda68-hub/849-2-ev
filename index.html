/* ===================================================== */

/* -------- SABİT HIZ -------- */

function startSmoothRoute() {

  const zoomElement = document.getElementById("zoom-level");
  if (zoomElement) {
    zoomElement.classList.add("hide");
  }


  const totalDuration = 33000;   
  const climbDuration = 5000;    
  const targetPitch = 35;   // Burayı değiştirerek genel pitch kontrolü yapabilirsin


  let startTime = null;

  const distanceElement = document.getElementById("distanceInfo");
  const speedElement = document.getElementById("speedInfo");
  const timeElement = document.getElementById("timeInfo");
  const altitudeElement = document.getElementById("altitudeInfo");

  // 🔥 ZOOM'A GÖRE İRTİFA
  function getAltitudeFromZoom(zoom) {
    return Math.max(30, Math.round(3000 / Math.pow(2, zoom - 10)));
  }

  function getDistance(a, b) {
    const R = 6371000;
    const toRad = x => x * Math.PI / 180;

    const dLat = toRad(b[1] - a[1]);
    const dLng = toRad(b[0] - a[0]);

    const lat1 = toRad(a[1]);
    const lat2 = toRad(b[1]);

    const h =
      Math.sin(dLat / 2) ** 2 +
      Math.cos(lat1) * Math.cos(lat2) *
      Math.sin(dLng / 2) ** 2;

    return 2 * R * Math.asin(Math.sqrt(h));
  }

  function getBearing(a, b) {
    const dx = b[0] - a[0];
    const dy = b[1] - a[1];
    return (Math.atan2(dx, dy) * 180 / Math.PI + 360) % 360;
  }

  function smoothAngle(current, target) {
    let diff = (target - current + 540) % 360 - 180;
    return current + diff * 0.003;
  }

  let totalDistance = 0;
  for (let i = 0; i < route.length - 1; i++) {
    totalDistance += getDistance(route[i], route[i + 1]);
  }

  let bearing = map.getBearing();

  function animate(time) {

    if (!startTime) startTime = time;

    const elapsed = time - startTime;
    const t = Math.min(elapsed / totalDuration, 1);
    const distanceCovered = t * totalDistance;

    const speedMS = distanceCovered / (elapsed / 1000 || 1);
    const speedKmh = speedMS * 3.6;

    distanceElement.innerText =
      "Mesafe: " + (distanceCovered / 1000).toFixed(2) + " km";

    timeElement.innerText =
      "Süre: " + Math.floor(elapsed / 1000) + " sn";

    speedElement.innerText =
      "Hız: " + speedKmh.toFixed(1) + " km/h";

    // 🔥 ZOOM'A BAĞLI İRTİFA
    const currentZoom = map.getZoom();
    const zoomAltitude = getAltitudeFromZoom(currentZoom);

    let climbAltitude;

    if (elapsed < climbDuration) {
      const progress = elapsed / climbDuration;
      const easeOut = 1 - Math.pow(1 - progress, 3);
      climbAltitude = zoomAltitude * easeOut;
    } else {
      climbAltitude = zoomAltitude;
    }

    altitudeElement.innerText =
      "İrtifa: ~" + Math.round(climbAltitude) + " m";

    // 📌 Rota ilerleme
    let traveled = 0;

    for (let i = 0; i < route.length - 1; i++) {

      const segment = getDistance(route[i], route[i + 1]);

      if (traveled + segment >= distanceCovered) {

        const progress =
          (distanceCovered - traveled) / segment;

        const lng =
          route[i][0] +
          (route[i + 1][0] - route[i][0]) * progress;

        const lat =
          route[i][1] +
          (route[i + 1][1] - route[i][1]) * progress;

        const targetBearing =
          getBearing(route[i], route[i + 1]);

        bearing = smoothAngle(bearing, targetBearing);

        // 🔥 PITCH YUMUŞAK GEÇİŞ
        const pitchProgress = Math.min(elapsed / 6000, 1);
		const newPitch = targetPitch * pitchProgress;

        map.easeTo({
          center: [lng, lat],
          bearing: bearing,
          pitch: newPitch,   // artık dinamik
          zoom: currentZoom,
          duration: 0
        });

        break;
      }

      traveled += segment;
    }

    if (elapsed < totalDuration) {
      requestAnimationFrame(animate);
    } else {

      distanceElement.innerText =
        "Mesafe: " + (totalDistance / 1000).toFixed(2) + " km";

      speedElement.innerText = "Hız: 0 km/h";

      startRotation();
    }
  }

  requestAnimationFrame(animate);
}

/* -------- DÖNÜŞ + YAZILAR -------- */
function startRotation() {

  const geoCenter = [33.81773, 38.413195];

  if (rotation) cancelAnimationFrame(rotation);

  map.easeTo({
    center: geoCenter,
    zoom: 16.5,
    duration: 6000,
    pitch: 35
  });

  map.once("moveend", () => {

    // 🔥 3 saniye bekle
    setTimeout(() => {

      // 📉 Flight panel kaybolsun
      const panel = document.getElementById("flightPanel");
      if (panel) {
        panel.style.transition = "opacity 1s ease, transform 1s ease";
        panel.style.opacity = "0";
        panel.style.transform = "translateY(-10px)";
      }

      // ⏳ Panel tamamen kaybolsun diye kısa bekleme
      setTimeout(() => {

        // ✅ MARKER'LARI KALDIR
        if (typeof markers !== "undefined") {
          markers.forEach(marker => marker.remove());
          markers = [];
        }

        // 🔄 Dönüş başlat
        function spin() {
          map.setBearing(map.getBearing() + 0.1);
          rotation = requestAnimationFrame(spin);
        }

        spin();

        // 📝 Yazılar
        startTextFlow();	
        showCenterTitle();
        fadeInParcelLabel();

      }, 1000);

    }, 3000);

  });
}

function fadeInParcelLabel() {

  let opacity = 0;

    opacity += 0.05;

    map.setPaintProperty(
      'parcels-labels',
      'text-opacity',
      opacity

    if (opacity >= 1) clearInterval(fade);

  }, 60);
}

  const span = document.createElement("span");
  span.style.display = "inline-block";
  span.style.animation = `letterWave 4s ease-in-out ${index * 0.2}s infinite`;

	if (letter === " ") {
    span.innerHTML = "&nbsp;";   // 🔥 boşluğu görünür yap
	} else {
    span.textContent = letter;
	}

	title.appendChild(span);

	});

  // Göster
  title.style.opacity = 1;
  title.style.transform = "translate(-50%, -50%) scale(1)";
}

// Sayfa yüklenince gizle
window.addEventListener("load", () => {
  document.getElementById("hero-center-title").style.opacity = 0;
});

</script>
